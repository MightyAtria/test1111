# QuantView — Nginx Production Config
# ─────────────────────────────────────────────────────────────────────────────
# Replace:
#   stock.yourdomain.com  →  your actual domain
#   /etc/letsencrypt/...  →  generated automatically by Certbot
#
# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name stock.yourdomain.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stock.yourdomain.com;

    # ── TLS (managed by Certbot) ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/stock.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stock.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff;
    add_header X-Frame-Options           SAMEORIGIN;
    add_header Referrer-Policy           strict-origin-when-cross-origin;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/quantview_access.log;
    error_log  /var/log/nginx/quantview_error.log;

    # ── Proxy to Streamlit ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # WebSocket upgrade (required for Streamlit real-time updates)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  86400s;   # Keep long-lived WebSocket connections
        proxy_send_timeout  86400s;
        proxy_buffering     off;      # Needed for streaming / SSE
    }
}
